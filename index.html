<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>শুভ জন্মদিন SHOPNO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Hind Siliguri', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(124deg, #ff6f61, #d4a5e5, #84fab0, #8fd3f4, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: gradientFlow 18s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      position: relative;
      overflow-x: hidden;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ভাসমান বেলুন, স্পার্কলস, হৃদয় */
    #balloons-container, #sparkles-container, #hearts-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .balloon, .sparkle, .heart {
      position: absolute;
      bottom: -10vh;
      opacity: 0.8;
      user-select: none;
      pointer-events: none;
      animation: floatUp linear infinite;
    }

    .balloon { font-size: 2rem; }
    .sparkle { font-size: 1.8rem; filter: drop-shadow(0 0 4px gold); }
    .heart { font-size: 2.2rem; color: #ff3366; text-shadow: 0 0 10px hotpink; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }

    /* মূল কার্ড */
    .birthday-card {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 60px 60px 40px 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.3);
      padding: 30px 25px 40px;
      position: relative;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.6);
      transition: all 0.3s ease;
    }

    h1 {
      font-size: 2.4rem;
      text-align: center;
      color: #1a1a2e;
      text-shadow: 0 4px 15px rgba(255,255,240,0.9);
      letter-spacing: 2px;
      word-break: break-word;
      margin-bottom: 25px;
      font-weight: 800;
    }
    h1 span {
      background: linear-gradient(45deg, gold, #ff1493, #00ced1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 2.8rem;
      display: inline-block;
    }

    /* সার্কুলার ফটো গ্লো */
    .photo-wrapper {
      display: flex;
      justify-content: center;
      margin: 15px 0 30px;
    }
    .glowing-photo {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      box-shadow: 0 0 25px 8px #ffd966, 0 0 45px 15px #ffb3ba;
      animation: glowPulse 2.5s infinite alternate;
      transition: transform 0.4s ease;
    }
    .glowing-photo:hover {
      transform: scale(1.03);
    }
    @keyframes glowPulse {
      0% { box-shadow: 0 0 15px 5px #fada9f, 0 0 30px 10px #fbc2eb; }
      100% { box-shadow: 0 0 35px 15px #ff9a9e, 0 0 60px 20px #a18cd1; }
    }

    /* গিফট বক্স */
    .gift-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 15px 0 25px;
    }
    .gift-box {
      font-size: 6rem;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.3s;
      filter: drop-shadow(0 15px 20px #5a3e2b);
      line-height: 1;
    }
    .gift-box:hover {
      transform: scale(1.15) rotate(3deg);
      filter: drop-shadow(0 20px 25px #3f2b1c);
    }
    .gift-message {
      background: rgba(255,250,240,0.9);
      backdrop-filter: blur(6px);
      padding: 15px 25px;
      border-radius: 50px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #b13e3e;
      box-shadow: 0 8px 25px #ffb6c1;
      margin-top: 15px;
      border: 2px dashed hotpink;
      transform: scale(0);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 90%;
      text-align: center;
    }
    .gift-message.show {
      transform: scale(1);
    }

    /* টাইপিং অ্যানিমেশন */
    .typing-container {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1e272e;
      background: rgba(255, 255, 255, 0.4);
      padding: 12px 20px;
      border-radius: 50px;
      margin: 20px 0 25px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid deeppink;
      width: fit-content;
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 15px rgba(255,255,255,0.6);
    }
    .cursor-blink {
      border-right-color: transparent;
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* স্লাইডার গ্যালারি */
    .slider-section {
      margin: 30px 0 20px;
    }
    .slider-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #1b1b2f;
      text-align: center;
      margin-bottom: 15px;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
    }
    .slider-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slider-track {
      width: 280px;
      height: 200px;
      border-radius: 35px;
      overflow: hidden;
      box-shadow: 0 20px 35px -5px #2c3e50;
      border: 4px solid white;
    }
    .slides {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }
    .slide {
      min-width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
    }
    .slider-btn {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(5px);
      border: none;
      font-size: 2.4rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0 8px;
      box-shadow: 0 8px 18px #00000030;
      transition: all 0.2s;
      color: #e84342;
      font-weight: bold;
      z-index: 25;
    }
    .slider-btn:hover {
      background: white;
      transform: scale(1.15);
      color: #c0392b;
    }

    /* মিউজিক বাটন */
    .music-wrapper {
      display: flex;
      justify-content: center;
      margin: 15px 0 5px;
    }
    #musicButton {
      background: linear-gradient(145deg, #fff1f1, #ffe0f0);
      border: none;
      padding: 16px 32px;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #b22b5e;
      box-shadow: 0 10px 25px #ffa5c3;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid white;
    }
    #musicButton:hover {
      background: white;
      box-shadow: 0 15px 35px #ff98b9;
      transform: translateY(-3px);
    }

    /* কনফেটি ক্যানভাস */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* রেসপনসিভ */
    @media (max-width: 550px) {
      .birthday-card { padding: 20px 15px; }
      h1 { font-size: 1.9rem; }
      h1 span { font-size: 2.2rem; }
      .glowing-photo { width: 130px; height: 130px; }
      .gift-box { font-size: 5rem; }
      .typing-container { font-size: 1.2rem; padding: 8px 15px; white-space: normal; word-break: break-word; }
      .slider-track { width: 220px; height: 160px; }
      .slider-btn { width: 40px; height: 40px; font-size: 1.8rem; }
      #musicButton { padding: 12px 20px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- ভাসমান বেলুন, স্পার্কলস, হৃদয় -->
  <canvas id="confetti-canvas"></canvas>

  <div id="balloons-container"></div>
  <div id="sparkles-container"></div>
  <div id="hearts-container"></div>

  <main class="birthday-card">
    <!-- বন্ধুর নাম SHOPNO বসানো হয়েছে -->
    <h1>🎉 শুভ জন্মদিন <span>SHOPNO</span> 🎉</h1>

    <!-- ফ্রেন্ডের ফটো (গ্লো ইফেক্ট সহ) -->
    <div class="photo-wrapper">
      <img class="glowing-photo" src="https://i.ibb.co.com/pjRJdqLJ/FB-IMG-1773756891812.jpg-1494790108777-2961285f93b0?w=400&auto=format&fit=crop" alt="SHOPNO-এর ছবি">
    </div>

    <!-- গিফট বক্স সেকশন -->
    <div class="gift-section">
      <div class="gift-box" id="giftBox">🎁</div>
      <div id="giftMessage" class="gift-message">✨ ✨<br>🎂 HAPPY BIRTHDAY চোদনা 😆 🎂</div>
    </div>

    <!-- টাইপিং অ্যানিমেশন মেসেজ -->
    <div class="typing-container" id="typingMessage"></div>

    <!-- ফটো গ্যালারি স্লাইডার -->
    <div class="slider-section">
      <div class="slider-title">📸 মধুর স্মৃতি 📸</div>
      <div class="slider-container">
        <button class="slider-btn" id="prevSlide">❮</button>
        <div class="slider-track">
          <div class="slides" id="slides">
            <!-- স্লাইডের ছবি -->
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1527529482837-4698179dc6ce?w=400&auto=format&fit=crop');"></div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1530103043960-721387c3aec0?w=400&auto=format&fit=crop');"></div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1517451330947-7809dead78d5?w=400&auto=format&fit=crop');"></div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1464349153735-7db50ed83c84?w=400&auto=format&fit=crop');"></div>
          </div>
        </div>
        <button class="slider-btn" id="nextSlide">❯</button>
      </div>
    </div>

    <!-- মিউজিক বাটন -->
    <div class="music-wrapper">
      <button id="musicButton">🔊 অটো গান চলছে 🎵</button>
    </div>
  </main>

  <!-- অডিও ফাইল (অটোপ্লে) -->
  <audio id="birthdayAudio" loop autoplay>
    <source src="/lol.mp3">
  </audio>

  <script>
    (function() {
      // বন্ধুর নাম SHOPNO (যদি আপডেট করতে চান)
      const friendName = "SHOPNO";
      
      // হেডিং আপডেট (ইতিমধ্যে HTML-এ দেওয়া আছে, তবুও নিশ্চিত করছি)
      document.querySelector('h1 span').innerText = friendName;

      // ---------- ভাসমান এলিমেন্ট (বেলুন, স্পার্কলস, হৃদয়) ----------
      const balloonContainer = document.getElementById('balloons-container');
      const sparkleContainer = document.getElementById('sparkles-container');
      const heartsContainer = document.getElementById('hearts-container');

      const balloonIcons = ['🎈', '🎈', '🎊', '🎉', '🎈'];
      const sparkleIcons = ['✨', '💫', '🌟', '⭐', '⚡'];
      const heartIcons = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🤍'];

      function createFloating(container, icons, className, baseDuration = 12) {
        const el = document.createElement('div');
        el.className = className;
        el.innerText = icons[Math.floor(Math.random() * icons.length)];
        const size = Math.random() * 2 + 1.2;
        el.style.fontSize = size + 'rem';
        el.style.left = Math.random() * 100 + '%';
        el.style.animationDuration = (baseDuration + Math.random() * 10) + 's';
        el.style.animationDelay = Math.random() * -10 + 's';
        container.appendChild(el);
        setTimeout(() => { if (el.parentNode) el.remove(); }, 25000);
      }

      // প্রতিটি সেকেন্ডে নতুন এলিমেন্ট আসবে
      setInterval(() => createFloating(balloonContainer, balloonIcons, 'balloon', 15), 1300);
      setInterval(() => createFloating(sparkleContainer, sparkleIcons, 'sparkle', 10), 700);
      setInterval(() => createFloating(heartsContainer, heartIcons, 'heart', 14), 900);

      // শুরুতেই কিছু এলিমেন্ট তৈরি
      for (let i = 0; i < 8; i++) {
        setTimeout(() => createFloating(balloonContainer, balloonIcons, 'balloon', 15), i * 200);
        setTimeout(() => createFloating(sparkleContainer, sparkleIcons, 'sparkle', 10), i * 150);
        setTimeout(() => createFloating(heartsContainer, heartIcons, 'heart', 14), i * 180);
      }

      // ---------- কনফেটি (canvas) ----------
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      const particleCount = 90;

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function randomRange(min, max) { return Math.random() * (max - min) + min; }

      function initConfetti() {
        for (let i = 0; i < particleCount; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height * 0.2 - height,
            size: randomRange(6, 14),
            speedY: randomRange(2, 7),
            speedX: randomRange(-1.5, 1.5),
            color: `hsl(${randomRange(0, 360)}, 90%, 65%)`,
            rotation: randomRange(0, 360)
          });
        }
      }
      initConfetti();

      function updateConfetti() {
        for (let p of particles) {
          p.y += p.speedY * 0.6;
          p.x += p.speedX * 0.3;
          p.rotation += 1;

          if (p.y > height + 40) {
            p.y = -30;
            p.x = Math.random() * width;
            p.speedY = randomRange(2, 7);
            p.speedX = randomRange(-1.5, 1.5);
            p.color = `hsl(${randomRange(0, 360)}, 90%, 65%)`;
          }
        }
      }

      function drawConfetti() {
        ctx.clearRect(0, 0, width, height);
        for (let p of particles) {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate((p.rotation * Math.PI) / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size/1.5);
          ctx.restore();
        }
        updateConfetti();
        requestAnimationFrame(drawConfetti);
      }
      drawConfetti();

      // ---------- গিফট বক্স ওপেন ----------
      const giftBox = document.getElementById('giftBox');
      const giftMsg = document.getElementById('giftMessage');
      giftBox.addEventListener('click', () => {
        giftBox.innerText = '🎀✨📦'; // খোলা গিফট
        giftBox.style.transform = 'scale(1.2) rotate(2deg)';
        setTimeout(() => giftBox.style.transform = '', 200);
        giftMsg.classList.add('show');
        // কনফেটির ছোট বিস্ফোরণ
        for (let i = 0; i < 15; i++) {
          setTimeout(() => {
            for (let p of particles.slice(0, 5)) {
              p.y = height - 100;
              p.x = width / 2 + (Math.random() - 0.5) * 200;
            }
          }, i * 30);
        }
      });

      // ---------- টাইপিং অ্যানিমেশন (বাংলা + ইংরেজি মিক্স) ----------
      const message = `গেদা ${friendName}! গিফট বক্সে গুতা দেন 🎂🎁`;
      const typingDiv = document.getElementById('typingMessage');
      let i = 0;
      function typeWriter() {
        if (i < message.length) {
          typingDiv.innerHTML = message.substring(0, i+1) + (i % 2 === 0 ? '|' : '');
          i++;
          setTimeout(typeWriter, 100);
        } else {
          typingDiv.innerHTML = message;
          typingDiv.classList.remove('cursor-blink');
        }
      }
      typingDiv.classList.add('cursor-blink');
      typeWriter();

      // ---------- স্লাইডার লজিক ----------
      const slidesContainer = document.getElementById('slides');
      const prevBtn = document.getElementById('prevSlide');
      const nextBtn = document.getElementById('nextSlide');
      let slideIndex = 0;
      const totalSlides = document.querySelectorAll('.slide').length;

      function updateSlide() {
        slidesContainer.style.transform = `translateX(-${slideIndex * 100}%)`;
      }
      nextBtn.addEventListener('click', () => {
        slideIndex = (slideIndex + 1) % totalSlides;
        updateSlide();
      });
      prevBtn.addEventListener('click', () => {
        slideIndex = (slideIndex - 1 + totalSlides) % totalSlides;
        updateSlide();
      });
      // অটো স্লাইড
      setInterval(() => {
        slideIndex = (slideIndex + 1) % totalSlides;
        updateSlide();
      }, 4500);

      // ---------- মিউজিক অটোপ্লে + বাটন কন্ট্রোল ----------
      const audio = document.getElementById('birthdayAudio');
      const musicBtn = document.getElementById('musicButton');
      let musicPlaying = true; // অটোপ্লে চালু আছে

      // কিছু ব্রাউজারে autoplay নাও কাজ করতে পারে, সেক্ষেত্রে ম্যানুয়ালি চালানোর অপশন
      audio.volume = 0.5; // ভলিউম ৫০%

      // বাটনের লেখা আপডেট
      musicBtn.innerHTML = '🔊 অটো গান চলছে 🎵';

      musicBtn.addEventListener('click', () => {
        if (musicPlaying) {
          audio.pause();
          musicPlaying = false;
          musicBtn.innerHTML = '🔇 গান বন্ধ ⏸️';
        } else {
          audio.play()
            .then(() => {
              musicPlaying = true;
              musicBtn.innerHTML = '🔊 গান চলছে 🎵';
            })
            .catch(e => {
              alert('গান চালাতে নিচের বার্তায় ক্লিক করুন');
            });
        }
      });

      // ব্রাউজার অটোপ্লে পলিসির কারণে যদি কাজ না করে, তাহলে ইউজার প্রথম ক্লিকে চালাবে
      // পাশাপাশি আমরা চেষ্টা করব play() করার
      audio.play().catch(e => {
        console.log('অটোপ্লে ব্লকড, ইউজার ইন্টারঅ্যাকশন দরকার');
        musicBtn.innerHTML = '▶ গান চালান 🎵';
        musicPlaying = false;
      });

      // যদি অডিও লোড না হয়, তাহলে একটি নোট দেখাতে পারে
      // সবকিছু ঠিক থাকলে autoplay কাজ করবে
    })();
  </script>
</body>
</html>
